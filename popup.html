<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>金额大写转换</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 340px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: #1a1a2e;
      min-height: 160px;
      display: flex;
      flex-direction: column;
    }

    /* 币种选择 */
    .currency-bar {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 6px;
      padding: 16px 20px 0;
    }

    .currency-btn {
      flex: 1;
      padding: 8px 4px;
      font-size: 12px;
      font-weight: 500;
      color: rgba(255, 255, 255, 0.4);
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .currency-btn:hover {
      background: rgba(255, 255, 255, 0.1);
      color: rgba(255, 255, 255, 0.7);
    }

    .currency-btn.active {
      background: rgba(245, 158, 11, 0.15);
      border-color: rgba(245, 158, 11, 0.5);
      color: #f59e0b;
    }

    .currency-btn .symbol {
      display: block;
      font-size: 16px;
      margin-bottom: 2px;
    }

    /* 输入区 */
    .input-area {
      padding: 16px 20px 12px;
    }

    #amountInput {
      width: 100%;
      padding: 14px 18px;
      font-size: 22px;
      font-family: 'SF Mono', 'Cascadia Code', 'Menlo', monospace;
      font-weight: 500;
      color: #f59e0b;
      background: rgba(245, 158, 11, 0.08);
      border: 2px solid rgba(245, 158, 11, 0.3);
      border-radius: 12px;
      outline: none;
      -moz-appearance: textfield;
      text-align: center;
      letter-spacing: 2px;
    }

    #amountInput::-webkit-outer-spin-button,
    #amountInput::-webkit-inner-spin-button {
      -webkit-appearance: none;
    }

    #amountInput::placeholder {
      color: rgba(245, 158, 11, 0.35);
      font-size: 14px;
      font-weight: 400;
      letter-spacing: 0;
    }

    #amountInput:focus {
      background: rgba(245, 158, 11, 0.12);
      border-color: rgba(245, 158, 11, 0.6);
      box-shadow: 0 0 0 4px rgba(245, 158, 11, 0.1);
    }

    /* 结果区 */
    .result-area {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 12px 20px 16px;
      min-height: 70px;
    }

    #resultText {
      font-size: 18px;
      font-weight: 500;
      color: rgba(255, 255, 255, 0.25);
      letter-spacing: 1px;
      text-align: center;
      cursor: pointer;
      padding: 12px 16px;
      border-radius: 8px;
      border: 1px dashed rgba(255, 255, 255, 0.15);
      transition: all 0.3s ease;
      min-height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1.5;
      word-break: break-word;
    }

    #resultText.filled {
      color: #fbbf24;
      border: none;
      background: rgba(245, 158, 11, 0.06);
      text-shadow: 0 0 30px rgba(251, 191, 36, 0.3);
    }

    #resultText.filled:hover {
      background: rgba(245, 158, 11, 0.1);
    }

    #resultText.error {
      color: #f87171;
      font-size: 13px;
      font-weight: 400;
      letter-spacing: 0;
      border-color: rgba(248, 113, 113, 0.2);
    }

    /* 提示 */
    .hint {
      padding: 0 20px 14px;
      font-size: 11px;
      color: rgba(255, 255, 255, 0.25);
      text-align: center;
      letter-spacing: 0.5px;
    }

    .hint.hidden {
      display: none;
    }

    /* 复制成功 Toast */
    .toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(16, 185, 129, 0.9);
      color: #fff;
      font-size: 13px;
      padding: 8px 20px;
      border-radius: 20px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.25s;
      z-index: 10;
    }

    .toast.show {
      opacity: 1;
    }

    /* 清空按钮 */
    .clear-btn {
      position: absolute;
      right: 28px;
      top: 50%;
      transform: translateY(-50%);
      width: 24px;
      height: 24px;
      border-radius: 50%;
      border: none;
      background: rgba(255, 255, 255, 0.1);
      color: rgba(255, 255, 255, 0.4);
      font-size: 14px;
      cursor: pointer;
      display: none;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, color 0.15s;
      line-height: 1;
    }

    .clear-btn:hover {
      background: rgba(255, 255, 255, 0.2);
      color: rgba(255, 255, 255, 0.7);
    }

    .clear-btn.visible {
      display: flex;
    }

    .input-area {
      position: relative;
    }
  </style>
</head>
<body>

  <div class="currency-bar">
    <button class="currency-btn active" data-currency="CNY" tabindex="0" aria-label="人民币" role="radio" aria-checked="true">
      <span class="symbol" aria-hidden="true">¥</span>
      人民币
    </button>
    <button class="currency-btn" data-currency="USD" tabindex="0" aria-label="美元" role="radio" aria-checked="false">
      <span class="symbol" aria-hidden="true">$</span>
      美元
    </button>
    <button class="currency-btn" data-currency="SAR" tabindex="0" aria-label="沙特里亚尔" role="radio" aria-checked="false">
      <span class="symbol" aria-hidden="true">﷼</span>
      里亚尔
    </button>
    <button class="currency-btn" data-currency="AED" tabindex="0" aria-label="阿联酋迪拉姆" role="radio" aria-checked="false">
      <span class="symbol" aria-hidden="true">د.إ</span>
      迪拉姆
    </button>
    <button class="currency-btn" data-currency="UGX" tabindex="0" aria-label="乌干达先令" role="radio" aria-checked="false">
      <span class="symbol" aria-hidden="true">USh</span>
      先令
    </button>
  </div>

  <div class="input-area">
    <input
      type="text"
      id="amountInput"
      placeholder="输入金额"
      autocomplete="off"
      autofocus
      aria-label="输入小写金额数字"
    >
    <button class="clear-btn" id="clearBtn" aria-label="清空输入" tabindex="0">&times;</button>
  </div>

  <div class="result-area">
    <span id="resultText" role="status" aria-live="polite" aria-label="转换结果">等待输入…</span>
  </div>

  <div class="hint" id="hint">点击结果复制</div>

  <div class="toast" id="toast">已复制</div>

  <script src="converter.js"></script>
  <script src="popup.js"></script>
</body>
</html>
