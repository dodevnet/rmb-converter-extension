<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>金额大写转换</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    /* ===== 主题色彩变量 ===== */
    :root {
      --bg: #f8f9fa;
      --text: #1e293b;
      --text-secondary: #64748b;
      --text-muted: #94a3b8;
      --placeholder: #94a3b8;
      --border: #e2e8f0;
      --accent: #f59e0b;
      --accent-text: #d97706;
      --accent-bg: rgba(245, 158, 11, 0.08);
      --accent-bg-hover: rgba(245, 158, 11, 0.14);
      --accent-border: rgba(245, 158, 11, 0.3);
      --accent-border-focus: rgba(245, 158, 11, 0.6);
      --accent-shadow: rgba(245, 158, 11, 0.15);
      --result-text: #b45309;
      --result-bg: rgba(245, 158, 11, 0.06);
      --result-bg-hover: rgba(245, 158, 11, 0.1);
      --result-border: #e2e8f0;
      --result-empty-text: #94a3b8;
      --error-text: #dc2626;
      --error-bg: rgba(220, 38, 38, 0.04);
      --error-border: rgba(220, 38, 38, 0.15);
      --btn-bg: #f1f5f9;
      --btn-text: #64748b;
      --btn-border: #e2e8f0;
      --btn-hover-bg: #e2e8f0;
      --btn-hover-text: #334155;
      --btn-active-bg: rgba(245, 158, 11, 0.12);
      --btn-active-border: rgba(245, 158, 11, 0.4);
      --btn-active-text: #d97706;
      --toast-bg: rgba(16, 185, 129, 0.92);
      --toast-text: #ffffff;
      --clear-bg: #e2e8f0;
      --clear-color: #94a3b8;
      --clear-hover-bg: #cbd5e1;
      --clear-hover-color: #475569;
      --hint-text: #94a3b8;
      --shadow-glow: 0 0 24px rgba(245, 158, 11, 0.12);
      --border-color: #e0e0e0;
      --radius-sm: 8px;
      --radius-md: 10px;
      --radius-lg: 12px;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1e1e2e;
        --text: #e2e8f0;
        --text-secondary: #94a3b8;
        --text-muted: rgba(255, 255, 255, 0.25);
        --placeholder: rgba(245, 158, 11, 0.35);
        --border: rgba(255, 255, 255, 0.1);
        --accent: #f59e0b;
        --accent-text: #f59e0b;
        --accent-bg: rgba(245, 158, 11, 0.08);
        --accent-bg-hover: rgba(245, 158, 11, 0.14);
        --accent-border: rgba(245, 158, 11, 0.3);
        --accent-border-focus: rgba(245, 158, 11, 0.6);
        --accent-shadow: rgba(245, 158, 11, 0.1);
        --result-text: #fbbf24;
        --result-bg: rgba(245, 158, 11, 0.06);
        --result-bg-hover: rgba(245, 158, 11, 0.1);
        --result-border: rgba(255, 255, 255, 0.15);
        --result-empty-text: rgba(255, 255, 255, 0.25);
        --error-text: #f87171;
        --error-bg: rgba(248, 113, 113, 0.04);
        --error-border: rgba(248, 113, 113, 0.2);
        --btn-bg: rgba(255, 255, 255, 0.05);
        --btn-text: rgba(255, 255, 255, 0.4);
        --btn-border: rgba(255, 255, 255, 0.1);
        --btn-hover-bg: rgba(255, 255, 255, 0.1);
        --btn-hover-text: rgba(255, 255, 255, 0.7);
        --btn-active-bg: rgba(245, 158, 11, 0.15);
        --btn-active-border: rgba(245, 158, 11, 0.5);
        --btn-active-text: #f59e0b;
        --toast-bg: rgba(16, 185, 129, 0.9);
        --toast-text: #ffffff;
        --clear-bg: rgba(255, 255, 255, 0.1);
        --clear-color: rgba(255, 255, 255, 0.4);
        --clear-hover-bg: rgba(255, 255, 255, 0.2);
        --clear-hover-color: rgba(255, 255, 255, 0.7);
        --hint-text: rgba(255, 255, 255, 0.25);
        --shadow-glow: 0 0 30px rgba(251, 191, 36, 0.3);
        --border-color: #3a3a4a;
      }
    }

    html {
      margin: 0;
      padding: 0;
      background: var(--bg);
      overflow: hidden;
      border-radius: 14px;
      box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.08), inset 0 0 0 1px rgba(0, 0, 0, 0.04);
    }

    body {
      width: 340px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: var(--bg);
      min-height: 160px;
      display: flex;
      flex-direction: column;
      transition: background 0.3s ease;
      border: 2px solid var(--border-color);
      border-radius: 14px;
      overflow: hidden;
    }

    /* 币种选择 */
    .currency-bar {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 6px;
      padding: 18px 18px 0;
    }

    .currency-btn {
      padding: 8px 4px;
      font-size: 12px;
      font-weight: 500;
      color: var(--btn-text);
      background: var(--btn-bg);
      border: 1px solid var(--btn-border);
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .currency-btn:hover {
      background: var(--btn-hover-bg);
      color: var(--btn-hover-text);
    }

    .currency-btn.active {
      background: var(--btn-active-bg);
      border-color: var(--btn-active-border);
      color: var(--btn-active-text);
    }

    .currency-btn .symbol {
      display: block;
      font-size: 16px;
      margin-bottom: 2px;
    }

    /* 输入区 */
    .input-area {
      position: relative;
      padding: 16px 18px 12px;
    }

    #amountInput {
      width: 100%;
      padding: 14px 18px;
      font-size: 22px;
      font-family: 'SF Mono', 'Cascadia Code', 'Menlo', monospace;
      font-weight: 500;
      color: var(--accent-text);
      background: var(--accent-bg);
      border: 2px solid var(--accent-border);
      border-radius: var(--radius-lg);
      outline: none;
      -moz-appearance: textfield;
      text-align: center;
      letter-spacing: 2px;
      transition: background 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
    }

    #amountInput::-webkit-outer-spin-button,
    #amountInput::-webkit-inner-spin-button {
      -webkit-appearance: none;
    }

    #amountInput::placeholder {
      color: var(--placeholder);
      font-size: 14px;
      font-weight: 400;
      letter-spacing: 0;
    }

    #amountInput:focus {
      background: var(--accent-bg-hover);
      border-color: var(--accent-border-focus);
      box-shadow: 0 0 0 4px var(--accent-shadow);
    }

    /* 结果区 */
    .result-area {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 12px 18px 16px;
      min-height: 70px;
    }

    #resultText {
      font-size: 18px;
      font-weight: 500;
      color: var(--result-empty-text);
      letter-spacing: 1px;
      text-align: center;
      cursor: pointer;
      padding: 12px 16px;
      border-radius: var(--radius-sm);
      border: 1px dashed var(--result-border);
      transition: all 0.3s ease;
      min-height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1.5;
      word-break: break-word;
      width: 100%;
    }

    #resultText.filled {
      color: var(--result-text);
      border: none;
      background: var(--result-bg);
      text-shadow: var(--shadow-glow);
    }

    #resultText.filled:hover {
      background: var(--result-bg-hover);
    }

    #resultText.error {
      color: var(--error-text);
      font-size: 13px;
      font-weight: 400;
      letter-spacing: 0;
      border-style: solid;
      border-color: var(--error-border);
      background: var(--error-bg);
      text-shadow: none;
    }

    /* 提示 */
    .hint {
      padding: 0 18px 18px;
      font-size: 11px;
      color: var(--hint-text);
      text-align: center;
      letter-spacing: 0.5px;
    }

    .hint.hidden {
      display: none;
    }

    /* 复制成功 Toast */
    .toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--toast-bg);
      color: var(--toast-text);
      font-size: 13px;
      padding: 8px 20px;
      border-radius: var(--radius-md);
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.25s;
      z-index: 10;
    }

    .toast.show {
      opacity: 1;
    }

    /* 清空按钮 */
    .clear-btn {
      position: absolute;
      right: 26px;
      top: 50%;
      transform: translateY(-50%);
      width: 24px;
      height: 24px;
      border-radius: 50%;
      border: none;
      background: var(--clear-bg);
      color: var(--clear-color);
      font-size: 14px;
      cursor: pointer;
      display: none;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, color 0.15s;
      line-height: 1;
    }

    .clear-btn:hover {
      background: var(--clear-hover-bg);
      color: var(--clear-hover-color);
    }

    .clear-btn.visible {
      display: flex;
    }
  </style>
</head>
<body>

  <div class="currency-bar">
    <button class="currency-btn active" data-currency="CNY" tabindex="0" aria-label="人民币" role="radio" aria-checked="true">
      <span class="symbol" aria-hidden="true">¥</span>
      人民币
    </button>
    <button class="currency-btn" data-currency="USD" tabindex="0" aria-label="美元" role="radio" aria-checked="false">
      <span class="symbol" aria-hidden="true">$</span>
      美元
    </button>
    <button class="currency-btn" data-currency="SAR" tabindex="0" aria-label="沙特里亚尔" role="radio" aria-checked="false">
      <span class="symbol" aria-hidden="true">﷼</span>
      里亚尔
    </button>
    <button class="currency-btn" data-currency="AED" tabindex="0" aria-label="阿联酋迪拉姆" role="radio" aria-checked="false">
      <span class="symbol" aria-hidden="true">د.إ</span>
      迪拉姆
    </button>
    <button class="currency-btn" data-currency="UGX" tabindex="0" aria-label="乌干达先令" role="radio" aria-checked="false">
      <span class="symbol" aria-hidden="true">USh</span>
      先令
    </button>
  </div>

  <div class="input-area">
    <input
      type="text"
      id="amountInput"
      placeholder="输入金额"
      autocomplete="off"
      autofocus
      aria-label="输入小写金额数字"
    >
    <button class="clear-btn" id="clearBtn" aria-label="清空输入" tabindex="0">&times;</button>
  </div>

  <div class="result-area">
    <span id="resultText" role="status" aria-live="polite" aria-label="转换结果">等待输入…</span>
  </div>

  <div class="hint" id="hint">点击结果复制</div>

  <div class="toast" id="toast">已复制</div>

  <script src="converter.js"></script>
  <script src="popup.js"></script>
</body>
</html>
